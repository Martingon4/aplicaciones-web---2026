 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de usuario</title>
  <link rel="stylesheet" href="css/get-data.css">
</head>
<body>
  <main>
    <h1>Formulario de registro</h1>
    <form action="#" method="post" id="register-form">
      <fieldset>
        <legend>Datos personales</legend>
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>
        <div>
          <label for="apellido-paterno">Apellido paterno</label>
          <input type="text" id="apellido-paterno" name="apellido_paterno" required>
        </div>
        <div>
          <label for="apellido-materno">Apellido materno</label>
          <input type="text" id="apellido-materno" name="apellido_materno" required>
        </div>
      </fieldset>

      <fieldset>
        <legend>Datos de cuenta</legend>
        <div>
          <label for="nick">Nick (nombre de usuario)</label>
          <input type="text" id="nick" name="nick" required>
        </div>
        <div>
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" required>
        </div>
        <div>
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
      </fieldset>

      <fieldset>
        <legend>Género</legend>
        <div>
          <input type="radio" id="genero-masculino" name="genero" value="masculino" required>
          <label for="genero-masculino">Masculino</label>
        </div>
        <div>
          <input type="radio" id="genero-femenino" name="genero" value="femenino">
          <label for="genero-femenino">Femenino</label>
        </div>
        <div>
          <input type="radio" id="genero-otro" name="genero" value="otro">
          <label for="genero-otro">Otro</label>
        </div>
      </fieldset>

      <button type="submit" class="btn">Registrarse</button>
      <a href="register-data.html" class="btn" id="ver-datos" hidden>Ver datos</a>
      <a href="get-data.html" class="btn" id="agregar-datos" hidden>Agregar datos personales</a>
      <a href="index.html" class="btn">Inicio</a>
    </form>

    <section id="usuarios-section">
      <h2>Usuarios registrados</h2>
      <div class="table-container">
        <table id="usuarios-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido Paterno</th>
              <th>Nick</th>
              <th>Correo</th>
              <th>Género</th>
              <th>Fecha Registro</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="7">Cargando usuarios...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="js/register.js"></script>
</body>
</html>
